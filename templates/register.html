{% extends 'base.html' %}
{% block title %}Criar Conta — FinanceApp{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-icon">₿</span>
      <h1>Finance<strong>App</strong></h1>
      <p>Crie sua conta gratuita</p>
    </div>
    {% if error %}<div class="alert alert-error" role="alert">{{ error }}</div>{% endif %}
    <form method="POST" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="form-group">
        <label for="name" class="form-label">Nome completo</label>
        <input id="name" name="name" type="text" class="form-input" placeholder="João Silva"
               autocomplete="name" required aria-required="true" minlength="2">
      </div>
      <div class="form-group">
        <label for="email" class="form-label">E-mail</label>
        <input id="email" name="email" type="email" class="form-input" placeholder="seu@email.com"
               autocomplete="email" required aria-required="true">
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Senha <small>(mínimo 6 caracteres)</small></label>
        <input id="password" name="password" type="password" class="form-input" placeholder="••••••••"
               autocomplete="new-password" required aria-required="true" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Criar Conta</button>
    </form>
    <p class="auth-link">Já tem conta? <a href="{{ url_for('login') }}">Entrar</a></p>
  </div>
</div>
{% endblock %}
