{% extends "base.html" %}
{% block title %}Criar Conta — FinançasPro{% endblock %}
{% block auth_content %}
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.auth-box{width:100%;max-width:440px}
.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
.auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#4f46e5,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.auth-logo-text{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.auth-logo-text span{color:var(--accent)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;box-shadow:var(--shadow-lg)}
.auth-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:4px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.auth-error{background:var(--red-light);color:var(--red);border:1px solid #fca5a5;border-radius:var(--radius-sm);padding:12px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.auth-footer{text-align:center;margin-top:20px;font-size:14px;color:var(--text2)}
.auth-footer a{font-weight:600}
</style>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">💸</div>
      <span class="auth-logo-text">Finanças<span>Pro</span></span>
    </div>
    <div class="auth-card">
      <h1 class="auth-title">Criar conta</h1>
      <p class="auth-sub">Comece a organizar suas finanças hoje</p>
      {% if error %}<div class="auth-error">❌ {{ error }}</div>{% endif %}
      <form method="POST" action="{{ url_for('cadastro') }}" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Nome completo</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="Seu nome" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha <span style="color:var(--text3);font-weight:400">(mín. 8 caracteres)</span></label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Confirmar senha</label>
          <input type="password" id="confirm" name="confirm" class="form-control" placeholder="••••••••" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">Criar conta</button>
      </form>
      <div class="auth-footer">Já tem conta? <a href="{{ url_for('login') }}">Entrar</a></div>
    </div>
  </div>
</div>
<script>const saved=localStorage.getItem('fp_theme')||'light';document.documentElement.setAttribute('data-theme',saved);</script>
{% endblock %}
